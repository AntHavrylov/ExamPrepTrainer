server {
    listen 80;

    location ~ ^/(auth|sections|documents|ai|sessions|health) {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        # Nginx buffers proxied responses by default, which would hold back
        # the whole SSE stream from /sessions/{id}/answer/stream until the
        # backend closes the connection - defeating live streaming.
        proxy_buffering off;
    }

    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }
}
